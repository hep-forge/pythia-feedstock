{% set versions = {
    "6.4.28": "b06f266e03f7482ecebffd418633dedec8aa25b8772ae19e038b754d7d33ba99"
} %}

{% set version = environ.get('COMMIT_VERSION', None) %}
{% set version = version or versions.keys()|first %}
{% set version = version|string %}

package:
  name: {{ environ.get('ANACONDA_PACKAGE', "pythia")|string|lower }}
  version: {{ environ.get('ANACONDA_VERSION', version)|replace("-", ".") }}

source:
  # PYTHIA 6 ships as a single monolithic Fortran source file -- no
  # tarball, no build system of its own. Frozen at 6.4.28 since 2013;
  # development moved to PYTHIA 8 (see main/8.x branches of this feedstock).
  url: "https://pythia.org/download/pythia6/pythia{{ version|replace('.', '') }}.f"
  {% if versions.get(version, None) %}
  sha256: {{ versions.get(version) }}
  {% endif %}

build:
  number: 0
  run_exports:
    - {{ pin_subpackage(name, max_pin="x.x") }}

requirements:
  build:
    - {{ compiler('fortran') }}
    - make

about:
  home: "https://pythia.org"
  license: "GPL-2.0-or-later"
  summary: "PYTHIA 6.4 -- legacy Fortran Monte Carlo event generator (frozen since 2013, superseded by PYTHIA 8)"

extra:
  recipe-maintainers:
    - meiyasan
